<!-- contact.component.html -->
<section class="bg-gray-100 py-16">
    <div class="container mx-auto">
      <h2 class="text-3xl font-bold mb-8">Contact Me</h2>
  
      <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
        <div>
          <p class="text-gray-700 mb-4">Feel free to reach out to me. You can use the form below or contact me through the provided email address.</p>
          <p class="text-gray-700">Email: your.email&#64;example.com</p>
        </div>
  
        <form class="flex flex-col">
          <label for="name" class="text-gray-600 mb-2">Your Name</label>
          <input type="text" id="name" name="name" class="p-2 border border-gray-300 mb-4" placeholder="John Doe" />
  
          <label for="email" class="text-gray-600 mb-2">Your Email</label>
          <input type="email" id="email" name="email" class="p-2 border border-gray-300 mb-4" placeholder="john.doe&#64;example.com" />
  
          <label for="message" class="text-gray-600 mb-2">Your Message</label>
          <textarea id="message" name="message" rows="4" class="p-2 border border-gray-300 mb-4" placeholder="Write your message here"></textarea>
  
          <button type="submit" class="bg-blue-500 text-white p-2 rounded-md hover:bg-blue-600">Send Message</button>
        </form>
      </div>
    </div>
  </section>
